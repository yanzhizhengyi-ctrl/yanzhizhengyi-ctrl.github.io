<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            padding: 0;
            margin: 0;
        }
        .dad {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .col{
            flex-direction: column;
            justify-content: flex-start;
        }
        .center {
            width: 600px;
        }
        .header {
            background-color: rgb(147, 211, 253);
            position: fixed;
            width: 100%;
            z-index: 9999;
        }
        .header .center {
            background-color: rgb(0, 125, 208);
            height: 60px;
        }
        .main{
            margin-top: 70px;
        }
        .left{
            background-color: rgb(209, 105, 31);
            height: 600px;
            flex:auto;
        }
        .gre{
            background-color: rgb(72, 201, 55);
            width: 100px;
            height: 200px;
            position: relative;
        }
        .footer {
            background-color: rgb(177, 177, 177);
        }
        .footer .center {
            background-color: rgb(57, 57, 57);
            height: 60px;
        }
        .yellow{
            background-color: rgb(231, 227, 8);
            height: 200px;
            flex:auto;
        }
        .gotop{
            width: 40px;
            height: 40px;
            background-color: blueviolet;
            position: fixed;
            bottom: 20px;
            right:20px;
            border-radius: 50%;
        }
        .ball{
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: red;
            left:25px;
            top:-30px;
            z-index: 10000;
        }
    </style>
</head>

<body class="dad col">
    <div class="header dad">
        <div class="center"></div>
    </div>
    <div class="main dad">
        <div class="center dad">
            <div class="left"></div>
            <div class="right dad col">
                <div class="gre"></div>
                <div class="gre">
                    <div class="ball"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="main2 dad">
        <div class="center dad">
            <div class="yellow"></div>
            <div class="yellow"></div>
        </div>
    </div>
    <div class="main3 dad">
        <div class="center dad">
            <div class="yellow"></div>
            <div class="yellow"></div>
            <div class="yellow"></div>
        </div>
    </div>
    <div class="footer dad">
        <div class="center"></div>
    </div>

    <div class="gotop">

    </div>
</body>

</html>
