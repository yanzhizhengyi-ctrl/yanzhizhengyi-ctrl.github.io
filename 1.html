<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap:10px
        }
        .container{
            width: 600px;
        }
        .header{
            background-color: rgb(156, 180, 248);
            display: flex;
            justify-content: center;
        }
        .header > .container{
            background-color: rgb(40, 90, 241);
            height: 40px;
        }
        .footer{
            background-color: rgb(167, 168, 168);
            display: flex;
            justify-content: center;
        }
        .footer > .container{
            background-color: rgb(63, 63, 63);
            height: 40px;
        }
        .main{
            display: flex;
            justify-content: center;
        }
        .main > .container{
            display: flex;
            gap:10px;
        }
        .left{
            background-color: rgb(221, 87, 10);
            height: 300px;
            flex:auto;
            display: flex;
            gap:10px
        }
        .fx{
            background-color:red;
            height: 30px;
            flex:auto;
        }
        .right{
            width: 90px;
            display: flex;
            gap:10px;
            flex-direction: column;
        }
        .item{
            background-color: rgb(90, 239, 49);
            height: 90px;
            width: 90px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container"></div>
    </div>
    <div class="main">
        <div class="container">
            <div class="left">
                <div class="fx"></div>
                <div class="fx"></div>
            </div>
            <div class="right">
                <div class="item"></div>
                <div class="item"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <div class="container"></div>
    </div>
</body>
</html>
